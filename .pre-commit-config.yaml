# Pre-commit hooks configuration for Next.js/TypeScript project
# See https://pre-commit.com for more information
# Setup: pip install pre-commit && pre-commit install

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Remove trailing whitespace
        exclude: \.(svg|md)$
      - id: end-of-file-fixer
        name: Fix end of files
        exclude: \.(svg)$
      - id: check-yaml
        name: Check YAML syntax
      - id: check-json
        name: Check JSON syntax
        exclude: ^(tsconfig\.json|\.vscode/.*)$
      - id: check-added-large-files
        name: Prevent large files (>5MB)
        args: ["--maxkb=5120"]
      - id: check-case-conflict
        name: Check case conflicts
      - id: check-merge-conflict
        name: Check merge conflicts
      - id: mixed-line-ending
        name: Normalize line endings to LF
        args: ["--fix=lf"]
      - id: detect-private-key
        name: Detect private keys

  # TypeScript/JavaScript/CSS formatting with Prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Format TypeScript/JavaScript/CSS/JSON
        types_or: [javascript, jsx, ts, tsx, css, json, yaml, markdown]
        exclude: |
          (?x)^(
            \.next/|
            out/|
            node_modules/|
            package-lock\.json|
            \.min\.(js|css)$
          )
        args:
          - "--write"
          - "--print-width=100"
          - "--tab-width=2"

  # TypeScript type checking
  - repo: local
    hooks:
      - id: tsc
        name: TypeScript type check
        entry: npx tsc --noEmit
        language: system
        types: [ts, tsx]
        pass_filenames: false

# Global exclude patterns
exclude: |
  (?x)^(
    \.git/|
    \.claude/|
    \.next/|
    out/|
    node_modules/|
    \.secrets\.baseline|
    public/assets/.*\.(mp4|jpg|jpeg|png|gif|HEIC|heic|webp)$|
    .*\.min\.(js|css)$|
    package-lock\.json
  )
